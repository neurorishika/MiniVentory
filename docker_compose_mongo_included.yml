version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"            # optional: expose for admin tools
    volumes:
      - mongo_data:/data/db
    command: ["--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: lab-inventory:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Ensure the app points at the compose mongo
      MONGO_URI: "mongodb://mongo:27017"
      APP_PORT: "8000"
    ports:
      - "8000:8000"              # Host:Container
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
