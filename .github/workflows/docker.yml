name: Build & Push Docker image
on:
  push:
    branches: [ main ]
    paths-ignore: [ "**.md" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/miniventory:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/miniventory:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/miniventory:buildcache,mode=max
