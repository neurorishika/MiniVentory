version: "3.9"
services:
  app:
    build: .
    image: lab-inventory:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: "8000"
      # Ensure your .env MONGO_URI points to your lab Mongo server
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
